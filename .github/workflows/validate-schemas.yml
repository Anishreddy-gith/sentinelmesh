name: validate-schemas

on:
  push:
    branches: [develop, main]
    paths:
      - 'docs/SCHEMA.md'
      - 'docs/schemas/**'
      - 'docs/types.ts'
      - 'docs/models.py'
      - 'tools/**'
      - 'Makefile'
      - '.github/workflows/validate-schemas.yml'
  pull_request:
    branches: [develop, main]
    paths:
      - 'docs/SCHEMA.md'
      - 'docs/schemas/**'
      - 'docs/types.ts'
      - 'docs/models.py'
      - 'tools/**'
      - 'Makefile'
      - '.github/workflows/validate-schemas.yml'

jobs:
  fixtures:
    name: ajv-validate-fixtures
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tools/package.json
      - name: Install tools/ dependencies
        run: cd tools && npm install --no-audit --no-fund
      - name: Validate fixtures (valid + invalid)
        run: make validate-fixtures

  drift:
    name: generator-drift-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tools/package.json
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install tools/ dependencies
        run: cd tools && npm install --no-audit --no-fund
      - name: Install datamodel-code-generator
        run: python -m pip install --quiet 'datamodel-code-generator[http]==0.25.6'
      - name: Regenerate and fail on diff
        run: make schema-drift-check
