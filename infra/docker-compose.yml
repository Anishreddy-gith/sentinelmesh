version: '3.9'
services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports: ["2181:2181"]
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on: [zookeeper]
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
  mongodb:
    image: mongo:7
    ports: ["27017:27017"]
    volumes: [mongo-data:/data/db]
  neo4j:
    image: neo4j:5
    ports: ["7474:7474", "7687:7687"]
    environment:
      NEO4J_AUTH: neo4j/sentinelmesh123
    volumes:
      - neo4j-data:/data
      - ./neo4j/init.cypher:/var/lib/neo4j/import/init.cypher
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  backend:
    build: ../backend
    ports: ["3001:3001"]
    env_file: ../.env
    depends_on: [kafka, mongodb, neo4j, redis]
  frontend:
    build: ../frontend
    ports: ["3000:3000"]
    depends_on: [backend]
  ingestion:
    build: ../ingestion
    env_file: ../.env
    depends_on: [kafka]
  graph-builder:
    build: ../graph
    env_file: ../.env
    depends_on: [kafka, neo4j]
  ml-inference:
    build: ../ml
    ports: ["8000:8000"]
    env_file: ../.env
    depends_on: [kafka, mongodb]
  fl-server:
    build: ../ml
    command: python federated/fl_server.py
    ports: ["8080:8080"]
    env_file: ../.env
volumes:
  mongo-data:
  neo4j-data:
