# SonarCloud configuration for SentinelMesh.
#
# Project key + organization come from the SonarCloud GitHub App auto-binding;
# they are not duplicated here.

# --- Files that are generated artifacts, NOT hand-authored source code. ----
# docs/types.ts and docs/models.py are regenerated from docs/schemas/ by
# `make schemas`; the schema-drift-check CI job ensures they cannot drift.
# Sonar's duplicate-literal and cognitive-complexity rules produce noise on
# these because the codegen inlines repeated definitions ($defs) at every
# use site by design (cross-tool compatibility, see tools/bundle-schemas.mjs).
sonar.exclusions=\
  docs/types.ts,\
  docs/models.py,\
  docs/schemas/fixtures/**,\
  docs/schemas/_all.schema.json,\
  **/node_modules/**,\
  **/__pycache__/**,\
  **/.bundled.schema.json

# Don't expect test coverage on docs/, infra/, schemas, or fixtures.
sonar.coverage.exclusions=\
  docs/**,\
  infra/**,\
  research/**,\
  tools/**

# Duplication exclusions — same set as sonar.exclusions plus the generated
# Pydantic models. CPD on regenerable code is not actionable.
sonar.cpd.exclusions=\
  docs/types.ts,\
  docs/models.py,\
  docs/schemas/**
